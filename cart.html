<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>購物車</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5ede0; padding-bottom: 120px; }

    .header {
      background: #c8a882;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #a07850;
      font-size: 16px;
    }

    .cart-item {
      background: #fffaf5;
      margin: 10px 12px;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .item-left { flex: 1; }
    .item-name { font-size: 15px; font-weight: bold; color: #5c3d1e; }
    .item-size { font-size: 13px; color: #a07850; margin-top: 3px; }
    .item-price { font-size: 15px; color: #c8a882; font-weight: bold; }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 20px;
      cursor: pointer;
      margin-left: 12px;
    }

    .section-title {
      font-size: 15px;
      font-weight: bold;
      color: #7a5c3e;
      padding: 16px 16px 8px;
      border-bottom: 2px solid #e0c9b0;
      margin: 12px 12px 0;
    }

    .form-group {
      background: #fffaf5;
      margin: 10px 12px;
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .form-label {
      font-size: 14px;
      color: #7a5c3e;
      font-weight: bold;
      margin-bottom: 8px;
      display: block;
    }

    .form-group select,
    .form-group textarea {
      width: 100%;
      border: 1px solid #e0c9b0;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      background: #fff8f0;
      color: #5c3d1e;
    }

    .form-group textarea {
      height: 80px;
      resize: none;
    }

    .total-bar {
      background: #fffaf5;
      margin: 10px 12px;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .total-label { font-size: 16px; color: #7a5c3e; font-weight: bold; }
    .total-price { font-size: 22px; color: #c8a882; font-weight: bold; }

    .submit-btn {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #c8a882;
      color: white;
      border: none;
      padding: 18px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
    }

    .submit-btn:disabled {
      background: #ddd;
      color: #aaa;
    }
  </style>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<div class="header">🛒 購物車</div>

<div id="cart-list"></div>

<div class="section-title">📋 取餐資訊</div>

<div class="form-group">
  <label class="form-label">取餐時間</label>
  <select id="pickup-time">
    <option value="">請選擇取餐時間</option>
    <option>06:00</option>
    <option>06:15</option>
    <option>06:30</option>
    <option>06:45</option>
    <option>07:00</option>
    <option>07:15</option>
    <option>07:30</option>
    <option>07:45</option>
    <option>08:00</option>
    <option>08:15</option>
    <option>08:30</option>
    <option>08:45</option>
    <option>09:00</option>
    <option>09:15</option>
    <option>09:30</option>
    <option>09:45</option>
    <option>10:00</option>
    <option>10:15</option>
    <option>10:30</option>
    <option>10:45</option>
    <option>11:00</option>
    <option>11:15</option>
    <option>11:30</option>
    <option>11:45</option>
    <option>12:00</option>
    <option>12:15</option>
    <option>12:30</option>
    <option>12:45</option>
    <option>13:00</option>
  </select>
</div>

<div class="form-group">
  <label class="form-label">備註（可不填）</label>
  <textarea id="note" placeholder="例如：少醬、不要辣..."></textarea>
</div>

<div class="total-bar">
  <span class="total-label">總金額</span>
  <span class="total-price" id="total-price">$0</span>
</div>

<button class="submit-btn" id="submit-btn" onclick="submitOrder()">確認送出訂單</button>

<script>
  const cart = JSON.parse(sessionStorage.getItem('cart') || '[]');
let liffUserName = '訪客';

// 初始化 LIFF 取得真實名字
async function initLiff() {
  try {
    await liff.init({ liffId: '2010109972-qzxmbbXg' });
    if (liff.isLoggedIn()) {
      const profile = await liff.getProfile();
      liffUserName = profile.displayName;
    } else {
      liff.login();
    }
  } catch (e) {
    console.log('LIFF init error:', e);
  }
}
initLiff();

  function renderCart() {
    const list = document.getElementById('cart-list');
    if (cart.length === 0) {
      list.innerHTML = '<div class="empty">購物車是空的<br>請返回菜單選餐 🍜</div>';
      document.getElementById('submit-btn').disabled = true;
      return;
    }
    list.innerHTML = cart.map((item, i) => `
      <div class="cart-item">
        <div class="item-left">
          <div class="item-name">${item.name}</div>
          <div class="item-size">${item.sizeName || ''}</div>
        </div>
        <div class="item-price">$${item.price}</div>
        <button class="delete-btn" onclick="removeItem(${i})">✕</button>
      </div>
    `).join('');
    const total = cart.reduce((sum, i) => sum + i.price, 0);
    document.getElementById('total-price').textContent = '$' + total;
  }

  function removeItem(index) {
    cart.splice(index, 1);
    sessionStorage.setItem('cart', JSON.stringify(cart));
    renderCart();
  }

  async function submitOrder() {
    const time = document.getElementById('pickup-time').value;
    const note = document.getElementById('note').value;
    if (!time) {
      alert('請選擇取餐時間！');
      return;
    }
    if (cart.length === 0) {
      alert('購物車是空的！');
      return;
    }

    const total = cart.reduce((sum, i) => sum + i.price, 0);
    const userName = liffUserName;

    document.getElementById('submit-btn').disabled = true;
    document.getElementById('submit-btn').textContent = '送出中...';

    try {
      const res = await fetch('/api/notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          items: cart,
          pickupTime: time,
          note: note,
          total: total,
          userName: userName
        })
      });

      if (res.ok) {
        sessionStorage.removeItem('cart');
        alert('✅ 訂單已送出！\n取餐時間：' + time + '\n請準時取餐 🍜');
        window.location.href = 'index.html';
      } else {
        alert('❌ 送出失敗，請再試一次！');
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('submit-btn').textContent = '確認送出訂單';
      }
    } catch (err) {
      alert('❌ 網路錯誤：' + err.message);
      document.getElementById('submit-btn').disabled = false;
      document.getElementById('submit-btn').textContent = '確認送出訂單';
    }
  }

  renderCart();
</script>
</body>
</html>
